# =========================================================
# Polo Faka · 生产环境编排
# 用法：
#   cp .env.prod.example .env.prod   # 改密码/域名
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
# =========================================================

services:
  mysql:
    image: mysql:8.0
    container_name: polo-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: polo_faka
      MYSQL_USER: polo
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=caching_sha2_password
      - --max-allowed-packet=32M
      # 小内存服务器（1-2G）关键调优：限制 MySQL 不吃光内存
      - --innodb-buffer-pool-size=64M
      - --innodb-log-file-size=16M
      - --innodb-flush-method=O_DIRECT
      - --performance-schema=OFF
      - --table-open-cache=128
      - --max-connections=50
      - --key-buffer-size=8M
      - --tmp-table-size=16M
      - --max-heap-table-size=16M
    volumes:
      - mysql_data:/var/lib/mysql
    deploy:
      resources:
        limits:
          memory: 384M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 30
    networks:
      - polo

  redis:
    image: redis:7-alpine
    container_name: polo-redis
    restart: always
    command:
      - "redis-server"
      - "--requirepass"
      - "${REDIS_PASSWORD}"
      - "--appendonly"
      - "yes"
      # 小内存调优：超过 96M 时按 LRU 驱逐，避免吃光
      - "--maxmemory"
      - "96mb"
      - "--maxmemory-policy"
      - "allkeys-lru"
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          memory: 128M
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      - polo

  api:
    # 镜像名同时给 `build` 和 `pull` 用：
    #   - 服务器从 ACR 拉镜像时按这个名字找
    #   - 本地 `docker compose build` 时也会用这个名字打 tag
    # 用 ACR：.env.prod 里设 IMAGE_BASE=registry.cn-xxx.aliyuncs.com/<namespace>
    # 不用 ACR：留空，默认本地 tag 是 polo-faka/polo-api:latest
    image: ${IMAGE_BASE:-polo-faka}/polo-api:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: polo-api
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      API_PREFIX: /api
      # 限制 Node 堆，触发 GC 而不是无限增长直到 OOM
      NODE_OPTIONS: "--max-old-space-size=384"
      DATABASE_URL: mysql://polo:${MYSQL_PASSWORD}@mysql:3306/polo_faka
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      POOL_ENCRYPTION_KEY: ${POOL_ENCRYPTION_KEY}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_DEFAULT_PASSWORD: ${ADMIN_DEFAULT_PASSWORD}
      CORS_ORIGINS: ${CORS_ORIGINS}
      ENABLE_MOCK_PAY: ${ENABLE_MOCK_PAY:-false}
      TRUST_PROXY: "true"
      ADMIN_IP_ALLOWLIST: ${ADMIN_IP_ALLOWLIST}
      # Cursorforge 代理 OpenAPI 接码：env 留空时会 fallback 到后台
      EMAIL_CODE_ENABLED: ${EMAIL_CODE_ENABLED:-}
      EMAIL_CODE_API_BASE: ${EMAIL_CODE_API_BASE:-}
      EMAIL_CODE_AGENT_KEY: ${EMAIL_CODE_AGENT_KEY:-}
      EMAIL_CODE_AGENT_SECRET: ${EMAIL_CODE_AGENT_SECRET:-}
      EMAIL_CODE_TIMEOUT_MS: ${EMAIL_CODE_TIMEOUT_MS:-}
      # 支付宝：env 留空时会 fallback 到后台「站点设置 → 支付宝」里的值
      # 推荐做法：这里全部留空，去后台填写（敏感字段会被 AES-GCM 加密入库）
      ALIPAY_ENABLED: ${ALIPAY_ENABLED:-}
      ALIPAY_SANDBOX: ${ALIPAY_SANDBOX:-}
      ALIPAY_APP_ID: ${ALIPAY_APP_ID:-}
      ALIPAY_PRIVATE_KEY: ${ALIPAY_PRIVATE_KEY:-}
      ALIPAY_PUBLIC_KEY: ${ALIPAY_PUBLIC_KEY:-}
      ALIPAY_SIGN_TYPE: ${ALIPAY_SIGN_TYPE:-}
      ALIPAY_SELLER_ID: ${ALIPAY_SELLER_ID:-}
      ALIPAY_NOTIFY_BASE_URL: ${ALIPAY_NOTIFY_BASE_URL:-}
      TZ: Asia/Shanghai
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    expose:
      - "4000"
    networks:
      - polo

  web:
    image: ${IMAGE_BASE:-polo-faka}/polo-web:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: polo-web
    restart: always
    depends_on:
      - api
    deploy:
      resources:
        limits:
          memory: 64M
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
    expose:
      - "80"
    networks:
      - polo

  caddy:
    image: caddy:2-alpine
    container_name: polo-caddy
    restart: always
    depends_on:
      - api
      - web
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    deploy:
      resources:
        limits:
          memory: 96M
    networks:
      - polo

volumes:
  mysql_data:
  redis_data:
  caddy_data:
  caddy_config:

networks:
  polo:
    driver: bridge

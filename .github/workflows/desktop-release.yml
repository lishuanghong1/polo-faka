name: Desktop Release

on:
  # 打 tag desktop-v0.1.0 之类即触发；也支持手动从 Actions 页面跑
  push:
    tags:
      - 'desktop-v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest' # Apple Silicon (arm64)
            args: '--target aarch64-apple-darwin'
            rust_target: 'aarch64-apple-darwin'
          - platform: 'macos-13' # Intel
            args: '--target x86_64-apple-darwin'
            rust_target: 'x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
            rust_target: ''
          - platform: 'windows-latest'
            args: ''
            rust_target: ''

    runs-on: ${{ matrix.platform }}
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri
          key: ${{ matrix.platform }}-${{ matrix.rust_target }}

      - name: Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install workspace deps
        run: pnpm install --frozen-lockfile

      - name: Build desktop bundle
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_name }}
          releaseName: 'Polo 桌面工具 ${{ github.ref_name }}'
          releaseBody: |
            ## 下载

            选择对应平台的安装包：

            - Windows：`.msi`（推荐）或 `-setup.exe`
            - macOS Apple Silicon：`aarch64.dmg`
            - macOS Intel：`x64.dmg`
            - Linux：`.AppImage`（通用）/ `.deb` / `.rpm`

            ## 常见安装问题

            - **macOS 提示「文件已损坏」**
              ```bash
              sudo xattr -rd com.apple.quarantine "/Applications/Polo 账号工具.app"
              ```
            - **Windows Defender 误报**：右键 → 更多选项 → 仍要运行
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

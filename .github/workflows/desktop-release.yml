name: Desktop Release

on:
  # 打 tag desktop-v0.1.0 之类即触发；也支持手动从 Actions 页面跑
  push:
    tags:
      - 'desktop-v*'
  workflow_dispatch:

permissions:
  contents: write # 用于（可选）回写 draft release 当作备份
  actions: read

jobs:
  # ─────────── 构建：Windows + macOS（arm / Intel），不含 Linux ───────────
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest' # Apple Silicon (arm64)
            args: '--target aarch64-apple-darwin --bundles dmg'
            rust_target: 'aarch64-apple-darwin'
          # macos-13 已退役；在 Apple Silicon runner 上交叉编译 Intel dmg
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin --bundles dmg'
            rust_target: 'x86_64-apple-darwin'
          - platform: 'windows-latest'
            args: '--bundles msi,nsis'
            rust_target: ''

    runs-on: ${{ matrix.platform }}
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      # 版本以根目录 package.json 的 packageManager 字段为准，避免与 version: 10 冲突
      - uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri
          key: ${{ matrix.platform }}-${{ matrix.rust_target }}

      - name: Install workspace deps
        run: pnpm install --frozen-lockfile

      - name: Build Tauri bundle
        working-directory: apps/desktop
        run: pnpm tauri build ${{ matrix.args }}

      # 收集所有可分发文件到一个统一目录便于上传
      - name: Collect bundles
        shell: bash
        run: |
          set -e
          mkdir -p dist-collected
          # tauri 输出可能在 target/release/bundle 或 target/<triple>/release/bundle
          find apps/desktop/src-tauri/target -type d -name bundle | while read d; do
            for ext in msi exe dmg deb rpm AppImage; do
              find "$d" -maxdepth 3 -type f -iname "*.$ext" -exec cp -v {} dist-collected/ \;
            done
          done
          ls -la dist-collected/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.platform }}${{ matrix.rust_target && format('-{0}', matrix.rust_target) || '' }}
          path: dist-collected/
          if-no-files-found: error
          retention-days: 7

  # ─────────── 汇总 + 上传到服务器 ───────────
  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true # 3 个 build 的产物压到一个目录

      - name: Generate latest.json manifest
        env:
          REF_NAME: ${{ github.ref_name }}
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          node <<'EOF'
          const fs = require('fs');
          const path = require('path');
          const dir = 'artifacts';
          const files = fs.readdirSync(dir).sort();
          const refName = process.env.REF_NAME;
          const version = refName.replace(/^desktop-v/, '');

          function classify(name) {
            const lc = name.toLowerCase();
            if (lc.endsWith('.msi')) return { platform: 'windows', kind: 'msi' };
            if (lc.endsWith('-setup.exe') || lc.endsWith('_setup.exe')) return { platform: 'windows', kind: 'nsis' };
            if (lc.endsWith('.exe')) return { platform: 'windows', kind: 'exe' };
            if (/aarch64.*\.dmg$/.test(lc) || /arm64.*\.dmg$/.test(lc)) return { platform: 'macos-arm', kind: 'dmg' };
            if (/(x64|x86_64|amd64).*\.dmg$/.test(lc)) return { platform: 'macos-intel', kind: 'dmg' };
            if (lc.endsWith('.dmg')) return { platform: 'macos-arm', kind: 'dmg' };
            if (lc.endsWith('.appimage')) return { platform: 'linux', kind: 'appimage' };
            if (lc.endsWith('.deb')) return { platform: 'linux', kind: 'deb' };
            if (lc.endsWith('.rpm')) return { platform: 'linux', kind: 'rpm' };
            return { platform: 'unknown', kind: 'other' };
          }

          const assets = files.map((name) => {
            const stat = fs.statSync(path.join(dir, name));
            return { name, size: stat.size, ...classify(name) };
          });

          const manifest = {
            version,
            tag: refName,
            commit: process.env.GITHUB_SHA,
            repository: process.env.GITHUB_REPO,
            releasedAt: new Date().toISOString(),
            urlBase: '/static/desktop/',
            assets,
          };

          fs.writeFileSync(path.join(dir, 'latest.json'), JSON.stringify(manifest, null, 2));
          console.log('Generated latest.json:', JSON.stringify(manifest, null, 2));
          EOF

      - name: List bundle to upload
        run: ls -lah artifacts/

      # 打成单个 tar.gz 再上传，避免 scp 多文件在慢链路上卡到超时
      - name: Pack release archive
        run: |
          tar -czf desktop-release.tar.gz -C artifacts .
          ls -lh desktop-release.tar.gz

      - name: Upload and extract on server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_STATIC_DIR: ${{ secrets.DEPLOY_STATIC_DIR }}
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          SSH_BASE="-i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=30 -o ServerAliveInterval=15 -o ServerAliveCountMax=8"
          REMOTE_ARCHIVE="/tmp/desktop-release-${{ github.run_id }}.tar.gz"

          echo "Uploading archive to ${DEPLOY_USER}@${DEPLOY_HOST}:${REMOTE_ARCHIVE} ..."
          scp $SSH_BASE -P "$DEPLOY_PORT" desktop-release.tar.gz "${DEPLOY_USER}@${DEPLOY_HOST}:${REMOTE_ARCHIVE}"

          echo "Extracting into ${DEPLOY_STATIC_DIR} ..."
          ssh $SSH_BASE -p "$DEPLOY_PORT" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "mkdir -p '${DEPLOY_STATIC_DIR}' && tar -xzf '${REMOTE_ARCHIVE}' -C '${DEPLOY_STATIC_DIR}' && rm -f '${REMOTE_ARCHIVE}' && ls -lah '${DEPLOY_STATIC_DIR}'"

      - name: Notify done
        run: |
          echo "✅ Released $REF_NAME"
          echo "Manifest: ${{ secrets.DEPLOY_PUBLIC_BASE_URL }}/latest.json"
        env:
          REF_NAME: ${{ github.ref_name }}
